name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Keep live trading locks off in CI test runs
      LIVE_TRADING_ENABLED: "false"
      POLYMARKET_LIVE_ENABLED: "false"
      AUTO_BET_ENABLED: "0"
      POLY_MLB_AUTO_BET_ENABLED: "0"
      MODE: shadow
      # Dummy values so import-time settings resolve without real secrets
      SUPABASE_URL: "https://example.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key-not-real"
      SUPABASE_ANON_KEY: "test-anon-key-not-real"
      PAVLOV_BYPASS_CONFIG: "1"
      # Never run external scrape integration in unit CI
      RUN_EXTERNAL_SYNC_INTEGRATION: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pavlov/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r pavlov/requirements.txt

      - name: Run backend unit tests
        run: |
          python -m unittest discover -s backend/tests -p "test_*.py" -v
