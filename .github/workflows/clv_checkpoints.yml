name: CLV Checkpoints

# Bounded CLV observation workflow — independent of Sync ML.
# Runs ~every 5 minutes so 15m/1h checkpoints are collected near their due times.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  clv:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: clv-checkpoints
      cancel-in-progress: false

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
      POLYMARKET_KEY_ID: ${{ secrets.POLYMARKET_KEY_ID }}
      POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
      APP_ENV: production
      LOG_LEVEL: INFO
      GITHUB_ACTIONS: "true"
      MODE: shadow
      LIVE_TRADING_ENABLED: "false"
      POLYMARKET_LIVE_ENABLED: "false"
      AUTO_BET_ENABLED: "0"
      POLY_MLB_AUTO_BET_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pavlov/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r pavlov/requirements.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Update CLV checkpoints (once)
        run: python scripts/run_clv_scheduler.py --once
