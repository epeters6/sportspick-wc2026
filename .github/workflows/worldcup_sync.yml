name: World Cup Sync

on:
  schedule:
    # Every 15 minutes — fast enough to catch match results shortly after final whistle
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  worldcup-sync:
    name: Fetch WC Results + Resolve Picks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WC_API_KEY: ${{ secrets.WC_API_KEY }}
      WC_API_BASE: ${{ secrets.WC_API_BASE }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-worldcup.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-worldcup.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Sync World Cup match data
        run: |
          python - <<'EOF'
          import asyncio
          from backend.sports_data.worldcup_fetcher import sync_matches
          async def main():
              count = await sync_matches()
              print(f"Matches synced: {count}")
          asyncio.run(main())
          EOF

      - name: Sync match stats (ESPN / MLB box scores)
        run: |
          python - <<'EOF'
          import asyncio
          from backend.sports_data.stats_sync import sync_match_stats, enrich_openfootball_ht
          async def main():
              n = await sync_match_stats(limit=120)
              ht = await enrich_openfootball_ht()
              print(f"Stats synced: {n}, HT enriched: {ht}")
          asyncio.run(main())
          EOF

      - name: Link picks to matches
        run: |
          python - <<'EOF'
          import asyncio
          from backend.sports_data.worldcup_fetcher import link_picks_to_matches
          async def main():
              linked = await link_picks_to_matches()
              print(f"Picks linked: {linked}")
          asyncio.run(main())
          EOF

      - name: Resolve pending picks
        run: |
          python - <<'EOF'
          from backend.sports_data.pick_resolver import resolve_all_pending_picks
          resolved = resolve_all_pending_picks()
          print(f"Picks resolved: {resolved}")
          EOF

      - name: Settle open autobets
        run: |
          python - <<'EOF'
          from backend.trading.autobet import resolve_autobets
          resolved = resolve_autobets()
          print(f"Autobets resolved: {resolved}")
          EOF
