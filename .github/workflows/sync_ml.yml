name: Sync ML

on:
  schedule:
    # Shadow validation schedule (10:00, 16:00, 22:00)
    - cron: '0 10,16,22 * * *'
  workflow_dispatch:

jobs:
  ml:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: quant-validation-${{ github.workflow }}
      cancel-in-progress: false

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
      POLYMARKET_KEY_ID: ${{ secrets.POLYMARKET_KEY_ID }}
      POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
      APP_ENV: production
      LOG_LEVEL: INFO
      GITHUB_ACTIONS: "true"
      MODE: shadow
      LIVE_TRADING_ENABLED: "false"
      POLYMARKET_LIVE_ENABLED: "false"
      AUTO_BET_ENABLED: "0"
      POLY_MLB_AUTO_BET_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pavlov/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r pavlov/requirements.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Run ML-only sync
        run: python scripts/run_sync.py --ml-only
        
      - name: Run Sports Shadow Validation
        run: python scripts/run_sports_shadow_validation.py

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quant-validation-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            sports_shadow_decisions.jsonl
            sports_paper_fills.jsonl
            sports_clv_tracking.jsonl
            weather_shadow_decisions.jsonl
            paper_fills.jsonl
            clv_tracking.jsonl
            orderbook_snapshots.jsonl
            sync_status.json
            reports/sports_shadow/*.json

