name: Scrape Picks

on:
  workflow_dispatch:
  # Scheduled scraping is handled by sync.yml (run_sync.py)
  # This legacy file is kept for reference only — schedule disabled

jobs:
  scrape:
    name: Run All Scrapers + Pick Extraction
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
      TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
      TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
      TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
      INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
      INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      WC_API_KEY: ${{ secrets.WC_API_KEY }}
      WC_API_BASE: ${{ secrets.WC_API_BASE }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright + Chromium (for TikTok scraper)
        run: |
          playwright install chromium --with-deps

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run Twitter scraper
        continue-on-error: true
        run: |
          python - <<'EOF'
          import asyncio
          from backend.scrapers.twitter_scraper import TwitterScraper
          async def main():
              scraper = TwitterScraper()
              count = await scraper.scrape_all()
              print(f"Twitter picks scraped: {count}")
          asyncio.run(main())
          EOF

      - name: Run TikTok scraper
        continue-on-error: true
        run: |
          python - <<'EOF'
          import asyncio
          from backend.scrapers.tiktok_scraper import TikTokScraper
          async def main():
              scraper = TikTokScraper()
              count = await scraper.scrape_all()
              print(f"TikTok picks scraped: {count}")
          asyncio.run(main())
          EOF

      - name: Run Instagram scraper
        continue-on-error: true
        run: |
          python - <<'EOF'
          import asyncio
          from backend.scrapers.instagram_scraper import InstagramScraper
          async def main():
              scraper = InstagramScraper()
              count = await scraper.scrape_all()
              print(f"Instagram picks scraped: {count}")
          asyncio.run(main())
          EOF
