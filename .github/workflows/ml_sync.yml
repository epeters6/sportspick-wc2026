name: ML Sync (legacy — use sync_ml.yml)

on:
  workflow_dispatch:
  # Hourly ML runs moved to sync_ml.yml

jobs:
  ml-sync:
    name: Elo Ranking + Consensus + Accuracy Scoring
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
      POLYMARKET_API_SECRET: ${{ secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_API_PASSPHRASE: ${{ secrets.POLYMARKET_API_PASSPHRASE }}
      POLY_KEY_ID: ${{ secrets.POLY_KEY_ID || secrets.POLYMARKET_KEY_ID }}
      POLY_SECRET_KEY: ${{ secrets.POLY_SECRET_KEY || secrets.POLYMARKET_SECRET_KEY }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Recompute Elo scores
        run: |
          python - <<'EOF'
          from backend.ml.elo_ranker import update_all_elo_scores
          updated = update_all_elo_scores()
          print(f"Elo scores updated: {updated}")
          EOF

      - name: Recompute consensus picks
        run: |
          python - <<'EOF'
          from backend.ml.consensus_engine import compute_all_consensus
          computed = compute_all_consensus()
          print(f"Consensus picks computed: {computed}")
          EOF

      - name: Recompute accuracy scores + streaks
        run: |
          python - <<'EOF'
          from backend.ml.accuracy_scorer import compute_pick_streaks, compute_consensus_scores
          compute_pick_streaks()
          compute_consensus_scores()
          print("Accuracy scoring complete")
          EOF

      - name: Daily snapshot (runs every hour, idempotent)
        run: |
          python - <<'EOF'
          from backend.ml.elo_ranker import snapshot_daily_stats
          snapshot_daily_stats()
          print("Daily snapshot written")
          EOF
