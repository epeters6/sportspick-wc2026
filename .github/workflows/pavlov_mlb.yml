name: Pavlov MLB

on:
  schedule:
    # 14:00 & 20:00 UTC ≈ 10:00 & 16:00 ET (pregame windows)
    - cron: '0 14,20 * * *'
    # Midnight ET resolution ≈ 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'cycle or resolve'
        required: false
        default: cycle

jobs:
  mlb:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
      POLY_KEY_ID: ${{ secrets.POLY_KEY_ID || secrets.POLYMARKET_API_KEY }}
      POLY_SECRET_KEY: ${{ secrets.POLY_SECRET_KEY || secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_KEY_ID: ${{ secrets.POLYMARKET_KEY_ID }}
      POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
      MIN_EDGE_THRESHOLD: "0.05"
      CHECK_INTERVAL_MINUTES: "30"
      POLY_MLB_AUTO_BET_ENABLED: "0"
      POLY_MLB_INGAME_ENABLED: "0"
      AUTO_BET_ENABLED: "0"
      POLY_AUTO_BET_ENABLED: "0"
      KELLY_FRACTION: "0.25"
      DISCORD_BOT_TOKEN: "dummy_token"
      DISCORD_CHANNEL_ID: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pavlov/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r pavlov/requirements.txt

      - name: Validate Supabase
        run: python scripts/ci_check_env.py

      - name: Pavlov MLB pregame cycle
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'cycle') ||
          (github.event_name == 'schedule' && github.event.schedule != '0 5 * * *')
        run: python scripts/run_pavlov_mlb.py

      - name: Pavlov MLB midnight resolution
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'resolve') ||
          (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *')
        run: python scripts/run_pavlov_mlb_resolve.py
