name: Sync Picks (legacy — use sync_scrape.yml + sync_ml.yml)

on:
  workflow_dispatch:
  # Scheduled runs moved to sync_scrape.yml (30m) and sync_ml.yml (hourly)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
      POLYMARKET_KEY_ID: ${{ secrets.POLYMARKET_KEY_ID }}
      POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
      APP_ENV: production
      LOG_LEVEL: INFO
      SYNC_FAST: "true"
      SYNC_SKIP_YT_SEARCH: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pavlov/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r pavlov/requirements.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Run full sync (manual only)
        run: python scripts/run_sync.py
