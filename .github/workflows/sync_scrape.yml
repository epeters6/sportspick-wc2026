name: Sync Scrape

on:
  schedule:
    # Lightweight pick scrape
    - cron: '0 9,15,21 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: quant-validation-${{ github.workflow }}
      cancel-in-progress: false

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      APP_ENV: production
      LOG_LEVEL: INFO
      SYNC_FAST: "true"
      GITHUB_ACTIONS: "true"
      MODE: shadow
      LIVE_TRADING_ENABLED: "false"
      POLYMARKET_LIVE_ENABLED: "false"
      AUTO_BET_ENABLED: "0"
      POLY_MLB_AUTO_BET_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate Supabase secrets
        run: python scripts/ci_check_env.py

      - name: Run scrape-only sync
        run: python scripts/run_sync.py --scrape-only
